# yt_transcribe: ingestion module for YouTube videos.
# default_output: where transcriptions are saved (subfolder per video).
# CLI flag --output overrides this. If neither is set, yt-transcribe errors out.
yt_transcribe:
  default_output: ~/Dropbox/00-PARA/3_RECURSOS/yt-transcribe-raw

translate:
  default_provider: anthropic
  target_language: pt-br

  providers:
    openai:
      model: gpt-4.1-mini
      api_key_env: OPENAI_API_KEY
    anthropic:
      model: claude-sonnet-4-6
      api_key_env: ANTHROPIC_API_KEY

# vault_import: bridge from yt_transcribe output to a Karpathy-LLM-Wiki vault.
# Set default_vault to the absolute path (or ~/...) of your destination vault.
# CLI flag --vault overrides this. If neither is set, vault-import errors out.
vault_import:
  default_vault: ~/Dropbox/SECOND-BRAIN-OBSIDIAN
